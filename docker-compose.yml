version: '3.8'

services:
  relay-api:
    build:
      context: .
      dockerfile: docker/relay-api/Dockerfile
    container_name: github-relay-api
    ports:
      - "8000:8000"
    environment:
      - APP_ENV=production
      - LOG_LEVEL=info
      - BEARER_TOKEN=${BEARER_TOKEN}
      - DB_PATH=/data/db.sqlite3
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    volumes:
      - relay-data:/data
      - ./docker/relay-api/logs:/app/logs:rw

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: github-relay-tunnel
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_CONFIG_DIR=/etc/cloudflared
    restart: unless-stopped
    depends_on:
      - relay-api
    volumes:
      - cloudflared-config:/etc/cloudflared

volumes:
  relay-data:
    driver: local
  cloudflared-config:
    driver: local
